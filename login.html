<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন লগইন - এ.এস.এ.এফ.বি</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; border-top: 6px solid #1a237e; }
        .logo-text { color: #1a237e; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        h2 { color: #333; margin-bottom: 25px; font-size: 22px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 14px; color: #666; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #1a237e; box-shadow: 0 0 5px rgba(26, 35, 126, 0.2); }
        button { width: 100%; padding: 14px; background: #1a237e; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #d32f2f; transform: translateY(-2px); }
        .back-home { margin-top: 20px; display: block; color: #1a237e; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-text">ADHARER SOPNER ALO</div>
        <h2>অ্যাডমিন লগইন প্যানেল</h2>
        
        <form id="adminLogin">
            <div class="input-group">
                <label>ইউজারনেম</label>
                <input type="text" id="username" placeholder="ইউজারনেম দিন" required>
            </div>
            
            <div class="input-group">
                <label>পাসওয়ার্ড</label>
                <input type="password" id="password" placeholder="পাসওয়ার্ড দিন" required>
            </div>
            
            <button type="submit">প্রবেশ করুন</button>
        </form>
        
        <a href="index.html" class="back-home">← মূল ওয়েবসাইটে ফিরে যান</a>
    </div>

    <script>
        document.getElementById('adminLogin').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // অ্যাডমিন এক্সেস ডাটা
            if(user === "admin" && pass === "asafbadmin") {
                alert("লগইন সফল হয়েছে। অ্যাডমিন ড্যাশবোর্ডে স্বাগতম।");
                window.location.href = "dashboard.html"; 
            } else {
                alert("ভুল ইউজারনেম বা পাসওয়ার্ড! আবার চেষ্টা করুন।");
            }
        });
    </script>
</body>
</html>
